name: super_map_example
description: Runnable showcase for the super_map Flutter package.

version: 1.0.0

topics:
  - flutter
  - widgets
  - material-design
  - design-system
  - theme

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink foundation (transitive via the package; listed for resolution).
  super_core: ^0.1.0
  super_map:
    path: ../
  # Used only by the "Editable + Export" example to save/share exported bytes.
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
