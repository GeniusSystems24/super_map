name: super_map_example
description: Runnable showcase for the super_map Flutter package.
publish_to: "none"
version: 0.2.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  super_map:
    path: ../
  # Used only by the "Editable + Export" example to save/share exported bytes.
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
