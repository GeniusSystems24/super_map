name: super_map
description: >
  Super Map — a GeniusLink design-system Flutter package providing SuperMap, a
  pannable, zoomable, draggable node-graph canvas with READ and EDIT modes:
  pan/zoom/drag/inspect in read; four-sided ports (drag to connect), add /
  rename / re-kind / recolour / duplicate / delete nodes, text-labelled
  connections, per-node notes, edge editing, undo and JSON import/export in
  edit. Curved/orthogonal/straight edge routing, card/chip/pill node styles, a
  dot grid, a live minimap, a selection details panel, an all-nodes data panel,
  an optional animated edge flow, and image / PDF / Word export. Five bundled
  sample graphs share one engine. Light/dark + LTR/RTL.
publish_to: "none"
version: 0.2.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink design-system foundation (theme, tokens, type, widgets).
  super_core:
    path: ../super_core
  # Export pipeline (v0.2.0): PDF assembly + DOCX (zip) packaging.
  pdf: ^3.10.0
  archive: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo-mark-white.png
