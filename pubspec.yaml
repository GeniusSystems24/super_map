name: super_map
description: >
  Super Map — a GeniusLink design-system Flutter package providing SuperMap, a
  pannable, zoomable, draggable node-graph canvas with READ and EDIT modes built
  for ERP / accounting diagrams: pan/zoom/drag/inspect in read; four-sided ports
  (drag to connect), add / rename / re-kind / recolour / duplicate / delete
  nodes, text-labelled connections, per-node notes, edge editing, undo and JSON
  import/export in edit. v1.0.0 adds an ERP layer — workflow status, audit
  locks, source-record refs + metadata, a per-graph currency, node search,
  layered / grid / radial auto-layout, an audit-grade validator (dangling /
  duplicate / cycle / orphan + double-entry flow-balance checks) and CSV export.
  Curved/orthogonal/straight edge routing, card/chip/pill node styles, a dot
  grid, a live minimap, a selection details panel, an all-nodes data panel, an
  optional animated edge flow, and image / PDF / Word / CSV export. Five bundled
  sample graphs share one engine. Light/dark + LTR/RTL.
publish_to: "none"
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink design-system foundation (theme, tokens, type, widgets).
  super_core:
    path: ../super_core
  # Export pipeline (v0.2.0): PDF assembly + DOCX (zip) packaging.
  pdf: ^3.10.0
  archive: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo-mark-white.png
